name: Resumen operativo diario a Gerencia

on:
  schedule:
    # 13:00 UTC = 8:00 a.m. hora Colombia (UTC-5), de lunes a viernes.
    - cron: '0 13 * * 1-5'
  workflow_dispatch: {}

jobs:
  enviar-resumen:
    runs-on: ubuntu-latest
    env:
      NAVISSI_RESUMEN_TOKEN: ${{ secrets.NAVISSI_RESUMEN_TOKEN }}
    steps:
      - name: Llamar al endpoint de resumen diario
        run: |
          test -n "$NAVISSI_RESUMEN_TOKEN"
          # HTTP en vez de HTTPS: el hosting no tiene SSL valido todavia (FreeHosting
          # devuelve su propia pagina "SSL Unavailable" en https, no llega a la app) -
          # cambiar de vuelta a https cuando el dominio pase por Cloudflare.
          curl --fail --silent --show-error --max-time 90 --retry 2 \
            -H "X-Navissi-Resumen-Token: ${NAVISSI_RESUMEN_TOKEN}" \
            "http://grupo10z.com.co/api_resumen_diario.php" \
            -o respuesta.json -w "HTTP %{http_code}\n"
          cat respuesta.json
