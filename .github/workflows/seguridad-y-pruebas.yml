name: Seguridad y pruebas NAVISSI

on:
  # Disparo automatico desactivado (2026-07-15) a pedido del dueño de la cuenta -
  # los workflows automaticos de GitHub Actions estaban generando demasiadas
  # notificaciones y posiblemente agotando los minutos gratis del plan. Se
  # puede correr a mano desde Actions -> este workflow -> "Run workflow".
  # push:
  #   branches: [main]
  # pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rechazar secretos y endpoints inseguros versionados
        shell: bash
        run: |
          set -euo pipefail
          # sincronizar-correo.yml y resumen-diario.yml usan http:// a proposito (el
          # hosting no tiene SSL valido todavia) - documentado en esos mismos archivos.
          ! git grep -n -E 'Danna|curl\.exe[^\n]*-k|http://grupo10z\.com\.co|token=[A-Fa-f0-9]{32,}' -- ':!*.md' ':!.github/workflows/seguridad-y-pruebas.yml' ':!.github/workflows/sincronizar-correo.yml' ':!.github/workflows/resumen-diario.yml'

      - name: Validar sintaxis PHP
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do php -l "$file" >/dev/null; done < <(find . -name '*.php' -not -path './data/*' -not -path './vendor/*' -print0)

      - name: Ejecutar pruebas de fases
        shell: bash
        run: |
          set -euo pipefail
          for test in tests/*_test.php; do php "$test"; done

      - name: Verificar exclusiones Docker
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^data/?$' .dockerignore
          grep -Eq '^private/?$' .dockerignore
          grep -Eq '^data/CSV/?$' .dockerignore
