name: Sincronizar correo Mesa de Ayuda

on:
  # La ejecución periódica vive en Cloudflare Workers (cada 2 minutos).
  # Este flujo queda disponible como respaldo manual, sin duplicar llamadas.
  workflow_dispatch: {}

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    env:
      NAVISSI_CORREO_TOKEN: ${{ secrets.NAVISSI_CORREO_TOKEN }}
    steps:
      - name: Llamar al endpoint de sincronizacion de correo
        run: |
          test -n "$NAVISSI_CORREO_TOKEN"
          curl --fail --silent --show-error --max-time 90 --retry 2 \
            -H "X-Navissi-Correo-Token: ${NAVISSI_CORREO_TOKEN}" \
            "https://grupo10z.com.co/api_correo_mesadeayuda.php" \
            -o respuesta.json -w "HTTP %{http_code}\n"
          cat respuesta.json
          jq -e '.ok == true and .estado == "en_proceso"' respuesta.json >/dev/null
