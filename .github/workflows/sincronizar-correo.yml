name: Sincronizar correo Mesa de Ayuda

on:
  schedule:
    # Cada 10 minutos. GitHub Actions no garantiza el minuto exacto (puede
    # atrasarse unos minutos en horas de mucha carga), pero corre sola,
    # sin depender de que FreeHosting tenga cron.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    env:
      NAVISSI_CORREO_TOKEN: ${{ secrets.NAVISSI_CORREO_TOKEN }}
    steps:
      - name: Llamar al endpoint de sincronizacion de correo
        run: |
          test -n "$NAVISSI_CORREO_TOKEN"
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 "https://grupo10z.com.co/api_correo_mesadeayuda.php?token=${NAVISSI_CORREO_TOKEN}" \
            -o respuesta.json -w "HTTP %{http_code}\n"
          cat respuesta.json
