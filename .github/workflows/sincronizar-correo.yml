name: Sincronizar correo Mesa de Ayuda

on:
  # Reactivado el 2026-07-23: el Cron Trigger de Cloudflare Workers no está
  # llamando de forma confiable al endpoint (el secreto CRON_TOKEN no queda
  # visible para scheduled() pese a redeploys, sin causa clara identificada
  # aún). GitHub Actions vuelve a ser el disparador real para ESTE flujo
  # puntual (no se reactivaron los demás workflows que se apagaron el
  # 2026-07-15 por consumo de minutos/notificaciones).
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    env:
      NAVISSI_CORREO_TOKEN: ${{ secrets.NAVISSI_CORREO_TOKEN }}
    steps:
      - name: Llamar al endpoint de sincronizacion de correo
        run: |
          test -n "$NAVISSI_CORREO_TOKEN"
          curl --fail --silent --show-error --max-time 90 --retry 2 \
            -H "X-Navissi-Correo-Token: ${NAVISSI_CORREO_TOKEN}" \
            "https://grupo10z.com.co/api_correo_mesadeayuda.php" \
            -o respuesta.json -w "HTTP %{http_code}\n"
          cat respuesta.json
          jq -e '.ok == true and .estado == "en_proceso"' respuesta.json >/dev/null
