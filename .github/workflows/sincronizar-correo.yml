name: Sincronizar correo Mesa de Ayuda

on:
  schedule:
    # Cada 10 minutos. GitHub Actions no garantiza el minuto exacto (puede
    # atrasarse unos minutos en horas de mucha carga), pero corre sola,
    # sin depender de que FreeHosting tenga cron.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    env:
      NAVISSI_CORREO_TOKEN: ${{ secrets.NAVISSI_CORREO_TOKEN }}
    steps:
      - name: Llamar al endpoint de sincronizacion de correo
        run: |
          test -n "$NAVISSI_CORREO_TOKEN"
          # HTTP en vez de HTTPS: el hosting no tiene SSL valido todavia (FreeHosting
          # devuelve su propia pagina "SSL Unavailable" en https, no llega a la app) -
          # cambiar de vuelta a https cuando el dominio pase por Cloudflare. max-time
          # generoso porque revisar los buzones reales puede tardar mas de 30s.
          curl --fail --silent --show-error --max-time 90 --retry 2 \
            -H "X-Navissi-Correo-Token: ${NAVISSI_CORREO_TOKEN}" \
            "http://grupo10z.com.co/api_correo_mesadeayuda.php" \
            -o respuesta.json -w "HTTP %{http_code}\n"
          cat respuesta.json
