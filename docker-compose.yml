# Levanta NAVISSI Inventario completo en un NAS (Synology/QNAP con Container
# Manager) o cualquier VPS Linux. Los secretos y SQLite viven en ./private,
# fuera del document root; ./data queda solo para adjuntos y agentes públicos.
#
# USO:
#   1. Copia toda esta carpeta (NAVISSI-INVENTARIO) al NAS/VPS
#   2. docker compose up -d --build
#   3. Publica el puerto detrás de un proxy HTTPS o accede por VPN.

services:
  navissi:
    build: .
    container_name: navissi-inventario
    ports:
      - "${NAVISSI_BIND_ADDRESS:-127.0.0.1}:8099:80"
    volumes:
      - ./data:/var/www/html/data
      - ./private:/var/lib/navissi
    environment:
      NAVISSI_PRIVATE_DIR: /var/lib/navissi
    restart: unless-stopped
